system:
  log_level: "INFO"
  log_file: "logs/rag.log"
  temp_dir: "tmp"

ingestion:
  chunk_size: 512
  chunk_overlap: 64
  max_workers: 4
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"

embedding:
  model_name: "all-MiniLM-L6-v2"
  batch_size: 32
  device: "cpu" # or "cuda"

vector_store:
  index_path: "data/faiss_index.bin"
  metadata_path: "data/metadata.json"
  metric: "cosine" # "l2" or "cosine"

retrieval:
  top_k: 5
  mmr_diversity: 0.5
  enable_bm25: true

generation:
  provider: "gemini" # "anthropic" or "openai" or "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.1
  max_tokens: 1024
